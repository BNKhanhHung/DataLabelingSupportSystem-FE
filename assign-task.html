<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phân công Task - Data Labeling</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;padding:40px}
.card{background:#1e293b;padding:24px;border-radius:10px;max-width:700px;margin-bottom:20px}
select,input{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#e2e8f0}
button{padding:10px 20px;background:#3b82f6;border:none;color:white;border-radius:6px;cursor:pointer}
button:disabled{opacity:0.6}
a{color:#38bdf8}
#dataItemList{max-height:200px;overflow:auto}
#dataItemList label{display:block;padding:6px 0;cursor:pointer}
#msg{margin-top:12px;font-size:14px}
</style>
</head>
<body>

<div class="card">
<h2>Phân công Task mới</h2>
<a href="manager.html">← Quay lại Manager</a>
<form id="form">
  <label>Dự án *</label>
  <select id="projectId" required></select>
  <label>Dataset (trong dự án)</label>
  <select id="datasetId"><option value="">-- Chọn dự án trước --</option></select>
  <label>DataItem (trạng thái NEW, chọn ít nhất 1)</label>
  <div id="dataItemList"><p style="color:#94a3b8;">Chọn dự án và dataset để tải data items.</p></div>
  <label>Annotator *</label>
  <select id="annotatorId" required></select>
  <label>Reviewer *</label>
  <select id="reviewerId" required></select>
  <button type="submit" id="btn">Tạo Task</button>
</form>
<p id="msg"></p>
</div>

<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;

  var projectSelect = document.getElementById('projectId');
  var datasetSelect = document.getElementById('datasetId');
  var dataItemList = document.getElementById('dataItemList');
  var annotatorSelect = document.getElementById('annotatorId');
  var reviewerSelect = document.getElementById('reviewerId');

  function loadProjects() {
    API.fetchWithAuth(cfg.projects + '?page=0&size=100').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      projectSelect.innerHTML = '<option value="">-- Chọn dự án --</option>' + list.map(function(p) {
        return '<option value="' + p.id + '">' + (p.name || p.id) + '</option>';
      }).join('');
    }).catch(function() { projectSelect.innerHTML = '<option value="">Lỗi tải dự án</option>'; });
  }

  function loadUsers() {
    API.fetchWithAuth(cfg.users + '?page=0&size=200').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      var role = function(r) { return (r || '').toUpperCase(); };
      var onlyUsers = list.filter(function(u) {
        var r = role(u.systemRole);
        return r !== 'ADMIN' && r !== 'MANAGER';
      });
      var opt = '<option value="">-- Chọn --</option>' + onlyUsers.map(function(u) {
        return '<option value="' + u.id + '">' + (u.username || u.email || u.id) + '</option>';
      }).join('');
      annotatorSelect.innerHTML = opt;
      reviewerSelect.innerHTML = opt;
    }).catch(function() {});
  }

  projectSelect.addEventListener('change', function() {
    var pid = this.value;
    datasetSelect.innerHTML = '<option value="">-- Chọn dataset --</option>';
    dataItemList.innerHTML = '<p style="color:#94a3b8;">Chọn dataset.</p>';
    if (!pid) return;
    API.fetchWithAuth(cfg.datasets + '/project/' + pid + '?page=0&size=50').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      datasetSelect.innerHTML = '<option value="">-- Chọn dataset --</option>' + list.map(function(d) {
        return '<option value="' + d.id + '">' + (d.name || d.id) + '</option>';
      }).join('');
    }).catch(function() { datasetSelect.innerHTML = '<option value="">Lỗi tải dataset</option>'; });
  });

  datasetSelect.addEventListener('change', function() {
    var did = this.value;
    dataItemList.innerHTML = '<p style="color:#94a3b8;">Đang tải...</p>';
    if (!did) { dataItemList.innerHTML = '<p style="color:#94a3b8;">Chọn dataset.</p>'; return; }
    API.fetchWithAuth(cfg.dataItems + '/dataset/' + did + '/status/NEW?page=0&size=100').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      if (list.length === 0) {
        dataItemList.innerHTML = '<p style="color:#f59e0b;">Không có data item nào trạng thái NEW trong dataset này.</p>';
        return;
      }
      dataItemList.innerHTML = list.map(function(item) {
        return '<label><input type="checkbox" name="dataItemId" value="' + item.id + '"> ' + (item.id || '').substring(0, 8) + '...</label>';
      }).join('');
    }).catch(function() { dataItemList.innerHTML = '<p style="color:#f87171;">Lỗi tải data items.</p>'; });
  });

  document.getElementById('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var projectId = projectSelect.value;
    var annotatorId = annotatorSelect.value;
    var reviewerId = reviewerSelect.value;
    var checked = document.querySelectorAll('input[name="dataItemId"]:checked');
    var dataItemIds = [].map.call(checked, function(c) { return c.value; });
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btn');
    if (!projectId || !annotatorId || !reviewerId) {
      msg.textContent = 'Vui lòng chọn dự án, annotator và reviewer.';
      msg.style.color = '#f87171';
      return;
    }
    if (dataItemIds.length === 0) {
      msg.textContent = 'Chọn ít nhất 1 data item (trạng thái NEW).';
      msg.style.color = '#f87171';
      return;
    }
    btn.disabled = true;
    msg.textContent = 'Đang tạo task...';
    msg.style.color = '#94a3b8';
    API.fetchWithAuth(cfg.tasks, {
      method: 'POST',
      body: JSON.stringify({ projectId: projectId, annotatorId: annotatorId, reviewerId: reviewerId, dataItemIds: dataItemIds })
    }).then(function(r) { return r.json(); }).then(function() {
      msg.textContent = 'Tạo task thành công.';
      msg.style.color = '#4ade80';
      setTimeout(function() { window.location.href = 'manager.html'; }, 1500);
    }).catch(function(err) {
      msg.textContent = 'Lỗi: ' + (err.message || 'Tạo thất bại');
      msg.style.color = '#f87171';
      btn.disabled = false;
    });
  });

  loadProjects();
  loadUsers();
})();
</script>
</body>
</html>
