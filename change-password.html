<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đổi mật khẩu - Data Labeling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
body { background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; display: flex; align-items: center; justify-content: center; }
.wrap { max-width: 420px; width: 100%; }
.card { background: #1e293b; border-radius: 12px; padding: 28px; border: 1px solid #334155; }
h1 { font-size: 20px; margin-bottom: 20px; color: #f1f5f9; }
label { display: block; font-size: 13px; color: #94a3b8; margin-top: 14px; }
input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 15px; }
button { width: 100%; padding: 12px; margin-top: 20px; border-radius: 8px; border: none; background: #22c55e; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
#msg { margin-top: 14px; font-size: 14px; }
a { color: #38bdf8; text-decoration: none; display: inline-block; margin-bottom: 16px; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <a href="user-dashboard.html">← Về Dashboard</a>
  <div class="card">
    <h1>Đổi mật khẩu</h1>
    <form id="form">
      <label>Mật khẩu hiện tại *</label>
      <input type="password" id="oldPassword" required placeholder="Nhập mật khẩu hiện tại" autocomplete="current-password">
      <label>Mật khẩu mới *</label>
      <input type="password" id="newPassword" required minlength="6" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
      <label>Xác nhận mật khẩu mới *</label>
      <input type="password" id="newPassword2" required minlength="6" placeholder="Nhập lại mật khẩu mới" autocomplete="new-password">
      <button type="submit" id="btn">Đổi mật khẩu</button>
    </form>
    <p id="msg"></p>
  </div>
</div>

<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;
  var role = (localStorage.getItem('systemRole') || '').toUpperCase();
  if (role === 'ADMIN' || role === 'MANAGER') {
    document.querySelector('a[href="user-dashboard.html"]').href = role === 'ADMIN' ? 'admin.html' : 'manager.html';
  } else {
    document.querySelector('a[href="user-dashboard.html"]').href = 'user-dashboard.html';
  }

  document.getElementById('form').addEventListener('submit', function(e) {
    e.preventDefault();
    var oldPwd = document.getElementById('oldPassword').value;
    var newPwd = document.getElementById('newPassword').value;
    var newPwd2 = document.getElementById('newPassword2').value;
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btn');
    if (newPwd !== newPwd2) {
      msg.textContent = 'Mật khẩu mới và xác nhận không khớp.';
      msg.style.color = '#f87171';
      return;
    }
    if (newPwd.length < 6) {
      msg.textContent = 'Mật khẩu mới phải có ít nhất 6 ký tự.';
      msg.style.color = '#f87171';
      return;
    }
    btn.disabled = true;
    msg.textContent = 'Đang xử lý...';
    msg.style.color = '#94a3b8';
    API.fetchWithAuth(cfg.users + '/me/password', {
      method: 'PATCH',
      body: JSON.stringify({ oldPassword: oldPwd, newPassword: newPwd })
    }).then(function(r) {
      if (r.status === 204) return;
      return r.json().then(function(d) { throw new Error(d.message || d.error || 'Lỗi'); });
    }).then(function() {
      msg.textContent = 'Đổi mật khẩu thành công.';
      msg.style.color = '#4ade80';
      document.getElementById('oldPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newPassword2').value = '';
    }).catch(function(err) {
      msg.textContent = 'Lỗi: ' + (err.message || 'Đổi mật khẩu thất bại.');
      msg.style.color = '#f87171';
    }).finally(function() { btn.disabled = false; });
  });
})();
</script>
</body>
</html>
