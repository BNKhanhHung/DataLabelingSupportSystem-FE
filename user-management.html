<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý người dùng - Data Labeling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
body { background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }
.wrap { max-width: 1000px; margin: 0 auto; }
h1 { font-size: 22px; margin-bottom: 20px; }
a { color: #38bdf8; text-decoration: none; }
a:hover { text-decoration: underline; }
.back { display: inline-block; margin-bottom: 20px; }
.card { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 24px; border: 1px solid #334155; }
.card h2 { font-size: 16px; margin-bottom: 16px; color: #f1f5f9; }
table { width: 100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
th { color: #94a3b8; font-weight: 500; }
tbody tr:hover { background: rgba(51, 65, 85, 0.5); }
input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; }
label { display: block; font-size: 13px; color: #94a3b8; margin-top: 12px; }
button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
.btn-primary { background: #22c55e; color: #fff; }
.btn-secondary { background: #475569; color: #fff; margin-left: 8px; }
.btn-danger { background: #dc2626; color: #fff; }
.btn-small { padding: 4px 10px; font-size: 12px; margin-right: 6px; }
#msg { margin-top: 12px; font-size: 14px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .grid2 { grid-template-columns: 1fr; } }
.role-badge { padding: 2px 8px; border-radius: 999px; font-size: 11px; }
.role-ADMIN { background: #7f1d1d; color: #fecaca; }
.role-MANAGER { background: #1e3a8a; color: #bfdbfe; }
.role-USER { background: #14532d; color: #bbf7d0; }
.status-ACTIVE { color: #4ade80; }
.status-INACTIVE { color: #f87171; }
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal.show { display: flex; }
.modal-inner { background: #1e293b; padding: 24px; border-radius: 12px; max-width: 440px; width: 100%; border: 1px solid #334155; }
.modal-inner h3 { margin-bottom: 16px; }
</style>
</head>
<body>
<div class="wrap">
  <a href="#" id="backLink" class="back">← Về Dashboard</a>
  <h1>Quản lý người dùng</h1>

  <div class="card">
    <h2>Thêm người dùng</h2>
    <form id="formCreate">
      <div class="grid2">
        <div>
          <label>Username *</label>
          <input type="text" id="c_username" required minlength="3" placeholder="Tên đăng nhập">
        </div>
        <div>
          <label>Email *</label>
          <input type="email" id="c_email" required placeholder="email@example.com">
        </div>
      </div>
      <div class="grid2">
        <div>
          <label>Mật khẩu *</label>
          <input type="password" id="c_password" required minlength="6" placeholder="Ít nhất 6 ký tự">
        </div>
        <div>
          <label>Trạng thái</label>
          <select id="c_status">
            <option value="ACTIVE">ACTIVE</option>
            <option value="INACTIVE">INACTIVE</option>
          </select>
        </div>
      </div>
      <div>
        <label>Vai trò hệ thống</label>
        <select id="c_systemRole">
          <option value="USER">USER</option>
          <option value="MANAGER">MANAGER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </div>
      <button type="submit" class="btn-primary" id="btnCreate">Thêm người dùng</button>
    </form>
    <p id="msgCreate"></p>
  </div>

  <div class="card">
    <h2>Danh sách người dùng</h2>
    <p id="tableCount" style="font-size:13px;color:#94a3b8;margin-bottom:12px;">Đang tải...</p>
    <table>
      <thead>
        <tr><th>Tên đăng nhập</th><th>Email</th><th>Trạng thái</th><th>Vai trò</th><th>Thao tác</th></tr>
      </thead>
      <tbody id="userTableBody">
        <tr><td colspan="5">Đang tải...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal" id="modalEdit">
  <div class="modal-inner">
    <h3>Sửa người dùng</h3>
    <form id="formEdit">
      <input type="hidden" id="e_id">
      <label>Username *</label>
      <input type="text" id="e_username" required minlength="3">
      <label>Email *</label>
      <input type="email" id="e_email" required>
      <label>Mật khẩu (để trống nếu không đổi)</label>
      <input type="password" id="e_password" minlength="6" placeholder="Để trống nếu giữ nguyên">
      <label>Trạng thái</label>
      <select id="e_status">
        <option value="ACTIVE">ACTIVE</option>
        <option value="INACTIVE">INACTIVE</option>
      </select>
      <label>Vai trò hệ thống</label>
      <select id="e_systemRole">
        <option value="USER">USER</option>
        <option value="MANAGER">MANAGER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
      <div style="margin-top:16px;">
        <button type="submit" class="btn-primary">Lưu</button>
        <button type="button" class="btn-secondary" id="btnCloseModal">Hủy</button>
      </div>
    </form>
    <p id="msgEdit"></p>
  </div>
</div>

<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;
  var role = (localStorage.getItem('systemRole') || '').toUpperCase();
  if (role !== 'ADMIN' && role !== 'MANAGER') {
    window.location.href = 'user-dashboard.html';
    return;
  }
  var params = new URLSearchParams(window.location.search);
  var from = params.get('from') || 'admin';
  var backUrl = from === 'manager' ? 'manager.html' : 'admin.html';
  document.getElementById('backLink').href = backUrl;

  function loadUsers() {
    API.fetchWithAuth(cfg.users + '?page=0&size=200').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      var total = data.totalElements !== undefined ? data.totalElements : list.length;
      document.getElementById('tableCount').textContent = 'Tổng: ' + total + ' người dùng';
      var tbody = document.getElementById('userTableBody');
      if (list.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">Chưa có người dùng.</td></tr>';
        return;
      }
      tbody.innerHTML = list.map(function(u) {
        var r = (u.systemRole || 'USER').toUpperCase();
        var roleClass = 'role-USER';
        if (r === 'ADMIN') roleClass = 'role-ADMIN';
        if (r === 'MANAGER') roleClass = 'role-MANAGER';
        var st = (u.status || 'ACTIVE').toUpperCase();
        var username = API.escapeHtml(u.username || '');
        var email = API.escapeHtml(u.email || '');
        var role = API.escapeHtml(r);
        var userId = API.escapeHtml(String(u.id || ''));
        return '<tr><td>' + username + '</td><td>' + email + '</td><td><span class="status-' + st + '">' + API.escapeHtml(st) + '</span></td><td><span class="role-badge ' + roleClass + '">' + role + '</span></td><td><button type="button" class="btn-small btn-secondary edit-btn" data-user="' + API.escapeHtml(JSON.stringify({id: u.id, username: u.username, email: u.email, status: u.status, systemRole: r})) + '">Sửa</button><button type="button" class="btn-small btn-danger delete-btn" data-id="' + userId + '">Xóa</button></td></tr>';
      }).join('');
      tbody.querySelectorAll('button.edit-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          try {
            var user = JSON.parse(btn.dataset.user);
            openEdit(user.id, user.username, user.email, user.status, user.systemRole);
          } catch(e) {
            console.error('Error parsing user data:', e);
          }
        });
      });
      tbody.querySelectorAll('button.delete-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          if (confirm('Bạn có chắc muốn xóa người dùng này?')) deleteUser(btn.dataset.id);
        });
      });
    }).catch(function(err) {
      var errMsg = API.escapeHtml(err.message || 'Unknown error');
      document.getElementById('userTableBody').innerHTML = '<tr><td colspan="5">Lỗi: ' + errMsg + '</td></tr>';
    });
  }

  function openEdit(id, username, email, status, systemRole) {
    document.getElementById('e_id').value = id;
    document.getElementById('e_username').value = username || '';
    document.getElementById('e_email').value = email || '';
    document.getElementById('e_password').value = '';
    document.getElementById('e_status').value = (status || 'ACTIVE').toUpperCase();
    document.getElementById('e_systemRole').value = (systemRole || 'USER').toUpperCase();
    document.getElementById('msgEdit').textContent = '';
    document.getElementById('modalEdit').classList.add('show');
  }

  document.getElementById('btnCloseModal').addEventListener('click', function() {
    document.getElementById('modalEdit').classList.remove('show');
  });

  document.getElementById('formEdit').addEventListener('submit', function(e) {
    e.preventDefault();
    var id = document.getElementById('e_id').value;
    var payload = {
      username: document.getElementById('e_username').value.trim(),
      email: document.getElementById('e_email').value.trim(),
      status: document.getElementById('e_status').value,
      systemRole: document.getElementById('e_systemRole').value
    };
    var pwd = document.getElementById('e_password').value;
    if (pwd && pwd.length >= 6) payload.password = pwd;
    var msg = document.getElementById('msgEdit');
    API.fetchWithAuth(cfg.users + '/' + id, {
      method: 'PUT',
      body: JSON.stringify(payload)
    }).then(function(r) { return r.json(); }).then(function() {
      msg.textContent = 'Đã cập nhật.';
      msg.style.color = '#4ade80';
      loadUsers();
      setTimeout(function() { document.getElementById('modalEdit').classList.remove('show'); }, 800);
    }).catch(function(err) {
      msg.textContent = 'Lỗi: ' + (err.message || '');
      msg.style.color = '#f87171';
    });
  });

  function deleteUser(id) {
    API.fetchWithAuth(cfg.users + '/' + id, { method: 'DELETE' }).then(function() {
      loadUsers();
    }).catch(function(err) {
      alert('Lỗi xóa: ' + (err.message || ''));
    });
  }

  document.getElementById('formCreate').addEventListener('submit', function(e) {
    e.preventDefault();
    var msg = document.getElementById('msgCreate');
    var btn = document.getElementById('btnCreate');
    var payload = {
      username: document.getElementById('c_username').value.trim(),
      email: document.getElementById('c_email').value.trim(),
      password: document.getElementById('c_password').value,
      status: document.getElementById('c_status').value,
      systemRole: document.getElementById('c_systemRole').value
    };
    btn.disabled = true;
    msg.textContent = 'Đang tạo...';
    msg.style.color = '#94a3b8';
    API.fetchWithAuth(cfg.users, {
      method: 'POST',
      body: JSON.stringify(payload)
    }).then(function(r) { return r.json(); }).then(function() {
      msg.textContent = 'Thêm người dùng thành công.';
      msg.style.color = '#4ade80';
      document.getElementById('c_username').value = '';
      document.getElementById('c_email').value = '';
      document.getElementById('c_password').value = '';
      loadUsers();
    }).catch(function(err) {
      msg.textContent = 'Lỗi: ' + (err.message || '');
      msg.style.color = '#f87171';
    }).finally(function() { btn.disabled = false; });
  });

  loadUsers();
})();
</script>
</body>
</html>
