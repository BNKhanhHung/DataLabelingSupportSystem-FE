<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task của tôi - Data Labeling</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;padding:40px}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
button,a.btn{padding:8px 16px;background:#3b82f6;border:none;color:white;border-radius:6px;cursor:pointer;text-decoration:none;font-size:14px}
a.back{background:#475569}
#list{max-width:700px}
#msg{margin-bottom:16px;color:#94a3b8}
</style>
</head>
<body>

<nav style="margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap">
  <a href="user-dashboard.html" class="btn back">← Dashboard</a>
  <a href="my-profile.html" class="btn" style="background:#475569">Thông tin của tôi</a>
  <a href="change-password.html" class="btn" style="background:#475569">Đổi mật khẩu</a>
  <a href="#" id="logoutLink" class="btn" style="background:#991b1b">Đăng xuất</a>
</nav>
<h2>Task được giao <button type="button" id="btnRefresh" class="btn" style="background:#475569;margin-left:12px">Làm mới</button></h2>
<p id="msg">Đang tải...</p>
<div id="list"></div>

<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;
  var msgEl = document.getElementById('msg');
  var listEl = document.getElementById('list');

  function ensureUserId(done) {
    var uid = localStorage.getItem('userId');
    if (uid) { done(uid); return; }
    API.fetchWithAuth(cfg.users + '/me').then(function(r) { return r.json(); }).then(function(me) {
      if (me.id != null) {
        localStorage.setItem('userId', String(me.id));
        done(String(me.id));
      } else done(null);
    }).catch(function() { done(null); });
  }

  function loadTasks(uid) {
    if (!uid) {
      msgEl.textContent = 'Không xác định được user. Vui lòng đăng nhập lại.';
      msgEl.style.color = '#f87171';
      return;
    }
    msgEl.textContent = 'Đang tải...';
    msgEl.style.color = '#94a3b8';
    API.fetchWithAuth(cfg.tasks + '/annotator/' + uid + '?page=0&size=50').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      msgEl.textContent = list.length === 0 ? 'Bạn chưa có task nào.' : 'Tổng: ' + list.length + ' task.';
      var html = list.length === 0 ? '<p>Chưa có task được giao.</p>' : list.map(function(t) {
        var status = t.status || 'OPEN';
        var tid = '';
        if (t != null) {
          var raw = t.id != null ? t.id : (t.taskId != null ? t.taskId : null);
          tid = raw != null ? (typeof raw === 'string' ? raw : String(raw)) : '';
        }
        var safeTid = (tid || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        return '<div class="card"><div><p><strong>' + (t.projectName || 'Project') + '</strong></p><p>Task ID: ' + (t.id != null ? (typeof t.id === 'string' ? t.id : String(t.id)) : '') + ' · Trạng thái: ' + status + '</p></div><a href="annotator-label.html?taskId=' + encodeURIComponent(tid) + '" class="btn" data-task-id="' + safeTid + '" onclick="sessionStorage.setItem(\'pendingTaskId\', this.getAttribute(\'data-task-id\'))">Bắt đầu gắn nhãn</a></div>';
      }).join('');
      listEl.innerHTML = html;
    }).catch(function(err) {
      msgEl.textContent = 'Lỗi: ' + (err.message || '');
      msgEl.style.color = '#f87171';
    });
  }

  ensureUserId(function(uid) { loadTasks(uid); });
  document.getElementById('btnRefresh').addEventListener('click', function() {
    ensureUserId(function(uid) { loadTasks(uid); });
  });
  document.getElementById('logoutLink').addEventListener('click', function(e) {
    e.preventDefault();
    localStorage.removeItem('token'); localStorage.removeItem('userId'); localStorage.removeItem('username');
    localStorage.removeItem('userEmail'); localStorage.removeItem('systemRole');
    window.location.href = 'login.html';
  });
})();
</script>
</body>
</html>
