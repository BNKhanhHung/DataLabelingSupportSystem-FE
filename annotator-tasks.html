<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task của tôi - Data Labeling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  color: #f1f5f9;
  padding: 24px;
}
.page { max-width: 920px; margin: 0 auto; }
.nav-top {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid rgba(51, 65, 85, 0.6);
}
.nav-top a {
  padding: 10px 16px; border-radius: 10px; text-decoration: none; font-size: 14px; font-weight: 500;
  background: rgba(30, 41, 59, 0.9); color: #e2e8f0; border: 1px solid #334155;
  transition: background 0.2s, border-color 0.2s;
}
.nav-top a:hover { background: #334155; border-color: #475569; }
.nav-top a.back { background: rgba(34, 197, 94, 0.15); color: #4ade80; border-color: rgba(34, 197, 94, 0.4); }
.nav-top a.back:hover { background: rgba(34, 197, 94, 0.25); }
#logoutLink { background: rgba(220, 38, 38, 0.2) !important; color: #f87171 !important; border-color: rgba(220, 38, 38, 0.4) !important; }
#logoutLink:hover { background: rgba(220, 38, 38, 0.3) !important; }
.header-row {
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
  margin-bottom: 20px;
}
.header-row h1 { font-size: 22px; font-weight: 600; color: #f8fafc; }
.btn-refresh {
  padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
  background: #334155; color: #e2e8f0; border: 1px solid #475569;
  transition: background 0.2s;
}
.btn-refresh:hover { background: #475569; }
#msg { margin-bottom: 16px; font-size: 14px; color: #94a3b8; }
.task-card, .card {
  background: rgba(30, 41, 59, 0.95);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  border: 1px solid #334155;
  transition: transform 0.2s, box-shadow 0.2s;
}
.task-card:hover, .card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  border-color: #475569;
}
.task-info p { margin: 4px 0; color: #94a3b8; font-size: 14px; }
.task-title { font-size: 16px; font-weight: 600; color: #f8fafc; }
.task-status {
  font-size: 12px; padding: 4px 10px; border-radius: 8px;
  background: #334155; color: #cbd5e1; margin-top: 6px; display: inline-block;
}
.btn-start {
  padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
  background: linear-gradient(135deg, #22c55e, #16a34a); color: white;
  text-decoration: none; border: none; cursor: pointer; white-space: nowrap;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-start:hover { opacity: 0.95; transform: scale(1.02); }
.card a.btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; text-decoration: none; transition: opacity 0.2s, transform 0.1s; }
.card a.btn:hover { opacity: 0.95; transform: scale(1.02); }
.empty-state {
  background: rgba(30, 41, 59, 0.8);
  padding: 48px 24px;
  border-radius: 14px;
  text-align: center;
  color: #94a3b8;
  border: 1px dashed #475569;
}
.empty-state p { font-size: 15px; margin-bottom: 8px; }
#list.empty-list .empty-state { display: block; }
</style>
</head>
<body>
<div class="page">
  <nav class="nav-top">
    <a href="user-dashboard.html" class="back">← Dashboard</a>
    <a href="my-profile.html">Thông tin của tôi</a>
    <a href="change-password.html">Đổi mật khẩu</a>
    <a href="#" id="logoutLink">Đăng xuất</a>
  </nav>
  <div class="header-row">
    <h1>Task được giao</h1>
    <button type="button" id="btnRefresh" class="btn-refresh">🔄 Làm mới</button>
  </div>
  <p id="msg">Đang tải...</p>
  <div id="list"></div>
</div>

<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;
  var msgEl = document.getElementById('msg');
  var listEl = document.getElementById('list');

  function ensureUserId(done) {
    var uid = localStorage.getItem('userId');
    if (uid) { done(uid); return; }
    API.fetchWithAuth(cfg.users + '/me').then(function(r) { return r.json(); }).then(function(me) {
      if (me.id != null) {
        localStorage.setItem('userId', String(me.id));
        done(String(me.id));
      } else done(null);
    }).catch(function() { done(null); });
  }

  function loadTasks(uid) {
    if (!uid) {
      msgEl.textContent = 'Không xác định được user. Vui lòng đăng nhập lại.';
      msgEl.style.color = '#f87171';
      return;
    }
    msgEl.textContent = 'Đang tải...';
    msgEl.style.color = '#94a3b8';
    var annotatorReq = API.fetchWithAuth(cfg.tasks + '/annotator/' + uid + '?page=0&size=50').then(function(r) { return r.json(); });
    var reviewerReq = API.fetchWithAuth(cfg.tasks + '/reviewer/' + uid + '?page=0&size=50').then(function(r) { return r.json(); });
    Promise.all([annotatorReq, reviewerReq]).then(function(results) {
      var annotatorData = results[0] || {};
      var reviewerData = results[1] || {};
      var annotatorList = (annotatorData.content || []).map(function(t) { t._type = 'annotator'; return t; });
      var reviewerList = (reviewerData.content || []).map(function(t) { t._type = 'reviewer'; return t; });
      var list = annotatorList.concat(reviewerList);
      msgEl.textContent = list.length === 0 ? 'Bạn chưa có task nào.' : 'Tổng: ' + list.length + ' task (gán nhãn + review).';
      var html = list.length === 0 ? '<div class="empty-state"><p>Chưa có task được giao.</p><p style="font-size:13px;margin-top:8px;">Khi manager giao task, danh sách sẽ hiển thị tại đây.</p></div>' : list.map(function(t) {
        var status = t.status || 'OPEN';
        var tid = '';
        if (t != null) {
          var raw = t.id != null ? t.id : (t.taskId != null ? t.taskId : null);
          tid = raw != null ? (typeof raw === 'string' ? raw : String(raw)) : '';
        }
        var safeTid = (tid || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
        var isReview = t._type === 'reviewer';
        var label = isReview ? 'Review' : 'Gán nhãn';
        var link = isReview ? 'reviewer-task-review.html' : 'annotator-label.html';
        var btnText = isReview ? 'Vào review nhãn' : 'Bắt đầu gắn nhãn';
        var storageKey = isReview ? 'pendingReviewTaskId' : 'pendingTaskId';
        return '<div class="card"><div><p><strong>' + (t.projectName || 'Project') + '</strong></p><p><span style="color:#94a3b8">' + label + '</span> · Task ID: ' + (t.id != null ? (typeof t.id === 'string' ? t.id : String(t.id)) : '') + ' · Trạng thái: ' + status + '</p></div><a href="' + link + '?taskId=' + encodeURIComponent(tid) + '" class="btn" data-task-id="' + safeTid + '" onclick="sessionStorage.setItem(\'' + storageKey + '\', this.getAttribute(\'data-task-id\'))">' + btnText + '</a></div>';
      }).join('');
      listEl.innerHTML = html;
    }).catch(function(err) {
      msgEl.textContent = 'Lỗi: ' + (err.message || '');
      msgEl.style.color = '#f87171';
    });
  }

  ensureUserId(function(uid) { loadTasks(uid); });
  document.getElementById('btnRefresh').addEventListener('click', function() {
    ensureUserId(function(uid) { loadTasks(uid); });
  });
  document.getElementById('logoutLink').addEventListener('click', function(e) {
    e.preventDefault();
    localStorage.removeItem('token'); localStorage.removeItem('userId'); localStorage.removeItem('username');
    localStorage.removeItem('userEmail'); localStorage.removeItem('systemRole');
    window.location.href = 'login.html';
  });
})();
</script>
</body>
</html>
