<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tạo Data Item - Data Labeling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
body {
  min-height: 100vh;
  background: linear-gradient(160deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
  color: #f1f5f9;
  padding: 24px;
}
.page { max-width: 640px; margin: 0 auto; }
.nav-top { margin-bottom: 28px; }
.nav-top a {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px; border-radius: 10px; text-decoration: none; font-size: 14px;
  background: rgba(30, 41, 59, 0.9); color: #94a3b8; border: 1px solid #334155;
  transition: background 0.2s, color 0.2s;
}
.nav-top a:hover { background: #334155; color: #e2e8f0; }
.card {
  background: rgba(30, 41, 59, 0.95);
  border-radius: 14px;
  padding: 32px;
  border: 1px solid #334155;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
}
.card h1 { font-size: 22px; font-weight: 600; color: #f8fafc; margin-bottom: 8px; }
.card .sub { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block; font-size: 14px; font-weight: 500; color: #e2e8f0; margin-bottom: 8px;
}
.form-group input, .form-group textarea, .form-group select {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1px solid #334155; background: #0f172a; color: #e2e8f0;
  font-size: 14px; transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
}
.form-group textarea { min-height: 70px; resize: vertical; }
.form-group input[type=file] { padding: 10px; }
.tabs {
  display: flex; gap: 8px; margin-bottom: 24px;
  background: #0f172a; padding: 6px; border-radius: 12px; border: 1px solid #334155;
}
.tabs button {
  flex: 1; padding: 12px 16px; border-radius: 8px; border: none;
  background: transparent; color: #94a3b8; font-size: 14px; font-weight: 500; cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.tabs button:hover { color: #e2e8f0; background: rgba(51, 65, 85, 0.5); }
.tabs button.active { background: #334155; color: #f8fafc; }
.panel { display: none; }
.panel.active { display: block; }
.form-actions { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-top: 24px; }
.btn-primary {
  padding: 12px 24px; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
  background: linear-gradient(135deg, #22c55e, #16a34a); color: white; border: none;
  transition: opacity 0.2s, transform 0.1s;
}
.btn-primary:hover { opacity: 0.95; transform: scale(1.02); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-back {
  padding: 12px 20px; border-radius: 10px; font-size: 14px; text-decoration: none;
  background: #334155; color: #e2e8f0; border: 1px solid #475569;
  transition: background 0.2s; margin-top: 16px; display: inline-block;
}
.btn-back:hover { background: #475569; }
#msg { margin-top: 16px; font-size: 14px; }
</style>
</head>
<body>
<div class="page">
  <nav class="nav-top">
    <a href="manager.html">← Quay lại Manager</a>
  </nav>
  <div class="card">
    <h1>Thêm Data Item</h1>
    <p class="sub">Chọn dự án và dataset, sau đó thêm bằng URL hoặc upload file.</p>

    <div class="form-group">
      <label for="projectId">Dự án *</label>
      <select id="projectId">
        <option value="">-- Chọn dự án --</option>
      </select>
    </div>
    <div class="form-group">
      <label for="datasetId">Dataset (trong dự án) *</label>
      <select id="datasetId">
        <option value="">-- Chọn dự án trước --</option>
      </select>
    </div>

    <div class="tabs">
      <button type="button" id="tabUrl" class="active">Một URL</button>
      <button type="button" id="tabBulk">Nhiều URL</button>
      <button type="button" id="tabUpload">Upload file</button>
    </div>

    <div id="panelUrl" class="panel active">
      <form id="formUrl">
        <div class="form-group">
          <label for="contentUrl">Content URL *</label>
          <input type="url" id="contentUrl" placeholder="https://example.com/image.jpg" maxlength="1000">
        </div>
        <div class="form-group">
          <label for="metadataUrl">Metadata (tùy chọn)</label>
          <textarea id="metadataUrl" rows="2" placeholder="JSON hoặc text mô tả"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" id="btnUrl" class="btn-primary">Tạo 1 Data Item</button>
        </div>
      </form>
    </div>

    <div id="panelBulk" class="panel">
      <form id="formBulk">
        <div class="form-group">
          <label for="contentUrlsBulk">Nhiều Content URL * (mỗi dòng một URL)</label>
          <textarea id="contentUrlsBulk" rows="8" placeholder="https://example.com/image1.jpg&#10;https://example.com/image2.jpg&#10;https://example.com/image3.jpg"></textarea>
          <small style="color:#94a3b8;font-size:12px;display:block;margin-top:6px;">URL trùng trong dataset sẽ được bỏ qua. Dòng trống sẽ bỏ qua.</small>
        </div>
        <div class="form-actions">
          <button type="submit" id="btnBulk" class="btn-primary">Tạo nhiều Data Item</button>
        </div>
      </form>
    </div>

    <div id="panelUpload" class="panel">
      <form id="formUpload">
        <div class="form-group">
          <label for="fileInput">Chọn một hoặc nhiều hình ảnh *</label>
          <input type="file" id="fileInput" accept="image/*" multiple>
          <small style="color:#94a3b8;font-size:12px;display:block;margin-top:6px;">Có thể chọn nhiều file cùng lúc (Ctrl/Cmd + click). Mỗi ảnh sẽ tạo một data item.</small>
        </div>
        <div class="form-group">
          <label for="metadataUpload">Metadata (tùy chọn, dùng chung cho tất cả ảnh)</label>
          <input type="text" id="metadataUpload" placeholder="Mô tả hoặc metadata">
        </div>
        <div class="form-actions">
          <button type="submit" id="btnUpload" class="btn-primary">Tải lên & tạo Data Item</button>
        </div>
      </form>
    </div>

    <p id="msg"></p>
    <a href="manager.html" class="btn-back">← Quay lại Manager</a>
  </div>
</div>
<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;
  var role = (localStorage.getItem('systemRole') || '').toUpperCase();
  if (role !== 'ADMIN' && role !== 'MANAGER') {
    window.location.href = 'user-dashboard.html';
    return;
  }
  var projectSelect = document.getElementById('projectId');
  var datasetSelect = document.getElementById('datasetId');
  var msg = document.getElementById('msg');
  function showMsg(text, isError) {
    msg.textContent = text;
    msg.style.color = isError ? '#f87171' : '#4ade80';
  }
  API.fetchWithAuth(cfg.projects + '?page=0&size=100').then(function(r) { return r.json(); }).then(function(data) {
    var list = data.content || [];
    projectSelect.innerHTML = '<option value="">-- Chọn dự án --</option>' + list.map(function(p) {
      return '<option value="' + p.id + '">' + (p.name || p.id) + '</option>';
    }).join('');
  }).catch(function() { projectSelect.innerHTML = '<option value="">Lỗi tải dự án</option>'; });
  projectSelect.addEventListener('change', function() {
    var pid = this.value;
    datasetSelect.innerHTML = '<option value="">-- Chọn dataset --</option>';
    if (!pid) return;
    datasetSelect.disabled = true;
    API.fetchWithAuth(cfg.datasets + '/project/' + pid + '?page=0&size=50').then(function(r) { return r.json(); }).then(function(data) {
      var list = data.content || [];
      datasetSelect.disabled = false;
      datasetSelect.innerHTML = '<option value="">-- Chọn dataset --</option>' + list.map(function(d) {
        return '<option value="' + d.id + '">' + (d.name || d.id) + '</option>';
      }).join('');
    }).catch(function() { datasetSelect.disabled = false; datasetSelect.innerHTML = '<option value="">Lỗi tải dataset</option>'; });
  });
  function setActiveTab(activeTabId) {
    ['tabUrl', 'tabBulk', 'tabUpload'].forEach(function(id) {
      document.getElementById(id).classList.toggle('active', id === activeTabId);
    });
    ['panelUrl', 'panelBulk', 'panelUpload'].forEach(function(id) {
      document.getElementById(id).classList.toggle('active', id === 'panel' + activeTabId.replace('tab', ''));
    });
  }
  document.getElementById('tabUrl').addEventListener('click', function() { setActiveTab('tabUrl'); });
  document.getElementById('tabBulk').addEventListener('click', function() { setActiveTab('tabBulk'); });
  document.getElementById('tabUpload').addEventListener('click', function() { setActiveTab('tabUpload'); });
  document.getElementById('formUrl').addEventListener('submit', function(e) {
    e.preventDefault();
    var datasetId = datasetSelect.value;
    var contentUrl = document.getElementById('contentUrl').value.trim();
    if (!datasetId) { showMsg('Vui lòng chọn dự án và dataset.', true); return; }
    if (!contentUrl) { showMsg('Vui lòng nhập Content URL.', true); return; }
    var btn = document.getElementById('btnUrl');
    btn.disabled = true;
    showMsg('Đang tạo...', false);
    API.fetchWithAuth(cfg.dataItems, {
      method: 'POST',
      body: JSON.stringify({
        datasetId: datasetId,
        contentUrl: contentUrl,
        metadata: document.getElementById('metadataUrl').value.trim() || null
      })
    }).then(function(r) { return r.json(); }).then(function() {
      showMsg('Tạo data item thành công.');
      document.getElementById('contentUrl').value = '';
      document.getElementById('metadataUrl').value = '';
    }).catch(function(err) {
      showMsg('Lỗi: ' + (err.message || 'Tạo thất bại'), true);
    }).finally(function() { btn.disabled = false; });
  });

  document.getElementById('formBulk').addEventListener('submit', function(e) {
    e.preventDefault();
    var datasetId = datasetSelect.value;
    var raw = document.getElementById('contentUrlsBulk').value || '';
    var contentUrls = raw.split(/\r?\n/).map(function(s) { return s.trim(); }).filter(Boolean);
    if (!datasetId) { showMsg('Vui lòng chọn dự án và dataset.', true); return; }
    if (contentUrls.length === 0) { showMsg('Vui lòng nhập ít nhất một URL (mỗi dòng một URL).', true); return; }
    var btn = document.getElementById('btnBulk');
    btn.disabled = true;
    showMsg('Đang tạo ' + contentUrls.length + ' data item...', false);
    API.fetchWithAuth(cfg.dataItems + '/bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ datasetId: datasetId, contentUrls: contentUrls })
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || d.error || 'Tạo thất bại'); });
      return r.json();
    }).then(function(created) {
      var count = Array.isArray(created) ? created.length : 0;
      var skipped = contentUrls.length - count;
      if (count === 0) {
        showMsg('Không tạo được data item mới. Có thể tất cả URL đã tồn tại trong dataset.', true);
      } else {
        showMsg('Đã tạo ' + count + ' data item.' + (skipped > 0 ? ' (Bỏ qua ' + skipped + ' URL trùng.)' : ''));
        document.getElementById('contentUrlsBulk').value = '';
      }
    }).catch(function(err) {
      showMsg('Lỗi: ' + (err.message || 'Tạo thất bại'), true);
    }).finally(function() { btn.disabled = false; });
  });
  document.getElementById('formUpload').addEventListener('submit', function(e) {
    e.preventDefault();
    var datasetId = datasetSelect.value;
    var fileInput = document.getElementById('fileInput');
    if (!datasetId) { showMsg('Vui lòng chọn dự án và dataset.', true); return; }
    if (!fileInput.files || fileInput.files.length === 0) { showMsg('Vui lòng chọn ít nhất một hình ảnh.', true); return; }
    var files = Array.from(fileInput.files);
    var meta = document.getElementById('metadataUpload').value.trim();
    var btn = document.getElementById('btnUpload');
    btn.disabled = true;
    var url = API.getBaseUrl() + '/api/data-items/upload';
    var token = API.getToken();
    var total = files.length;
    var done = 0;
    var failed = 0;
    var lastError = '';
    function doUpload(index) {
      if (index >= files.length) {
        if (done > 0) {
          showMsg('Đã tải lên ' + done + ' hình ảnh.' + (failed > 0 ? ' Thất bại: ' + failed + '.' + (lastError ? ' ' + lastError : '') : ''));
          fileInput.value = '';
          document.getElementById('metadataUpload').value = '';
        }
        if (failed === total) showMsg('Tất cả upload đều thất bại.' + (lastError ? ' ' + lastError : ''), true);
        btn.disabled = false;
        return;
      }
      showMsg('Đang tải ' + (index + 1) + '/' + total + '...', false);
      var formData = new FormData();
      formData.append('datasetId', datasetId);
      formData.append('file', files[index]);
      if (meta) formData.append('metadata', meta);
      fetch(url, {
        method: 'POST',
        headers: token ? { 'Authorization': 'Bearer ' + token } : {},
        body: formData
      }).then(function(res) {
        if (res.status === 401) {
          localStorage.removeItem('token');
          window.location.href = 'login.html';
          throw new Error('Unauthorized');
        }
        if (!res.ok) return res.json().then(function(d) {
          var m = d.message || d.error || ('HTTP ' + res.status);
          if (m === 'Upload failed: null' || (m && m.indexOf('null') !== -1 && m.length < 30)) m = 'Upload thất bại. Kiểm tra cấu hình Supabase.';
          throw new Error(m);
        });
        return res.json();
      }).then(function() {
        done++;
        doUpload(index + 1);
      }).catch(function(err) {
        failed++;
        lastError = err.message || '';
        doUpload(index + 1);
      });
    }
    doUpload(0);
  });
})();
</script>
</body>
</html>
