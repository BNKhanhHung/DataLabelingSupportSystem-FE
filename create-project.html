<!DOCTYPE html>
<html>
<head>
<title>Tạo Project</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;padding:40px}
input,select,textarea{width:100%;padding:10px;margin:10px 0;border-radius:6px;border:none}
button{padding:10px 20px;background:#22c55e;border:none;color:white;border-radius:6px;cursor:pointer}
.card{background:#1e293b;padding:30px;border-radius:12px;max-width:600px}
</style>
</head>
<body>

<div class="card">
<h2>Tạo Project Mới</h2>

<label>Tên Project</label>
<input type="text" placeholder="Nhập tên project">

<label>Loại dữ liệu</label>
<select>
<option>Image</option>
<option>Text</option>
<option>Audio</option>
</select>

<label>Mô tả</label>
<textarea rows="4"></textarea>

<button>Tạo Project</button>
</div>

</body>
</html>
