<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review nhãn - Data Labeling</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;padding:40px}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-bottom:16px}
button{padding:8px 16px;border:none;color:white;border-radius:6px;cursor:pointer;margin-right:8px}
.approve{background:#22c55e}
.reject{background:#ef4444}
a{color:#38bdf8}
#list{max-width:700px}
#msg{color:#94a3b8}
</style>
</head>
<body>

<nav style="margin-bottom:16px;">
  <a href="user-dashboard.html">← Dashboard</a>
  <a href="reviewer-tasks.html" style="margin-left:12px;color:#f59e0b;">Task cần review</a>
</nav>
<h2>Lịch sử review (đã gửi)</h2>
<p id="msg">Đang tải...</p>
<div id="list"></div>

<script src="api-config.js"></script>
<script src="api-helper.js"></script>
<script>
(function() {
  var API = window.API;
  var cfg = window.API_CONFIG;
  if (!API || !API.requireAuth()) return;
  var userId = localStorage.getItem('userId');
  if (!userId) { document.getElementById('msg').textContent = 'Chưa đăng nhập.'; return; }

  API.fetchWithAuth(cfg.reviewFeedbacks + '/reviewer/' + userId + '?page=0&size=50').then(function(r) { return r.json(); }).then(function(data) {
    var list = data.content || [];
    document.getElementById('msg').textContent = list.length === 0 ? 'Bạn chưa có review nào.' : 'Tổng: ' + list.length + ' feedback.';
    if (list.length === 0) {
      document.getElementById('list').innerHTML = '<p>Chưa có dữ liệu cần review.</p>';
      return;
    }
    document.getElementById('list').innerHTML = list.map(function(r) {
      return '<div class="card"><p>Review ID: ' + r.id + '</p><p>Annotation / TaskItem: ' + (r.taskItemId || '') + '</p><p>Trạng thái: ' + (r.status || '') + '</p><p>Nội dung: ' + (r.content || '').substring(0, 100) + '</p></div>';
    }).join('');
  }).catch(function(err) {
    document.getElementById('msg').textContent = 'Lỗi: ' + (err.message || '');
    document.getElementById('msg').style.color = '#f87171';
  });
})();
</script>
</body>
</html>
